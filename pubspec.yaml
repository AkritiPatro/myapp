name: my_app
description: "A new Flutter project with enhanced UI/UX and theme support."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Icons & fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State management
  provider: ^6.1.5+1

  # Toast messages
  fluttertoast: ^8.2.13

  # Optional animations
  animations: ^2.0.6
  
  # Updated Firebase Packages
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_analytics: ^12.1.0
  firebase_vertexai: any

  package_info_plus: ^9.0.0

  # Chatbot dependencies
  http: ^1.2.1
  flutter_dotenv: ^6.0.0
  go_router: ^17.0.0
  firebase_app_check_web: ^0.2.2+1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1
  flutter_markdown: ^0.7.3
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  font_awesome_flutter: ^10.7.0
  file_picker: 8.1.3
  google_generative_ai: ^0.4.7
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  
  assets:
    - assets/app.env
    - assets/app_config
    - assets/images/
    - assets/google_fonts/
    - assets/data/
    - assets/archive/
