name: my_app
description: "A new Flutter project with enhanced UI/UX and theme support."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Icons & fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^7.0.2

  # State management
  provider: ^6.1.5+1

  # Toast messages
  fluttertoast: ^9.0.0

  # Optional animations
  animations: ^2.0.6
  
  # Updated Firebase Packages
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_analytics: ^12.1.0
  firebase_ai: ^3.6.1 # Correct, stable version

  package_info_plus: ^9.0.0

  # Chatbot dependencies
  http: ^1.2.1
  flutter_dotenv: ^6.0.0
  go_router: ^17.0.1
  fl_chart: ^1.1.1
  firebase_app_check_web: ^0.2.2+1
  intl: ^0.20.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  
  assets:
    - .env                
    - assets/images/
    - assets/google_fonts/
